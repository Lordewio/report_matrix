<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Uganda Communications Commission logo mark</title>
  <desc id="desc">Circular logo mark with UCC text and signal arcs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D095B"/>
      <stop offset="100%" stop-color="#1D2673"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A09D"/>
      <stop offset="100%" stop-color="#7CE3D2"/>
    </linearGradient>
  </defs>

  <circle cx="120" cy="120" r="112" fill="url(#bg)"/>
  <circle cx="120" cy="120" r="106" fill="none" stroke="url(#accent)" stroke-width="4"/>

  <path d="M120 46a74 74 0 0 1 74 74" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
  <path d="M120 64a56 56 0 0 1 56 56" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M120 82a38 38 0 0 1 38 38" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" opacity="0.65"/>

  <text x="120" y="138" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" fill="#FFFFFF">UCC</text>
</svg>
